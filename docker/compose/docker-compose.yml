# Generated by CountOrSell first-run wizard. Do not edit manually.
# To regenerate, run the wizard again.
name: CountOrSell

services:
  app:
    image: ${REGISTRY}/countorsell:latest
    container_name: cos-app
    environment:
      - POSTGRES_CONNECTION=Host=cos-postgres;Database=countorsell;Username=${DB_USER};Password=${DB_PASSWORD}
      - INSTANCE_NAME=${INSTANCE_NAME}
      - UPDATE_CHECK_TIME=${UPDATE_CHECK_TIME}
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE}
      - BACKUP_RETENTION=${BACKUP_RETENTION}
      - BLOB_BACKUP_CONNECTION=${BLOB_BACKUP_CONNECTION}
      - ImageStore__BasePath=/app/data/images
    volumes:
      - countorsell_app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: cos-postgres
    environment:
      - POSTGRES_DB=countorsell
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - countorsell_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d countorsell"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  reverse-proxy:
    image: nginx:alpine
    container_name: cos-reverse-proxy
    ports:
      - "${PORT}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  countorsell_postgres_data:
    name: countorsell_postgres_data
  countorsell_app_data:
    name: countorsell_app_data
