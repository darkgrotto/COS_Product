# Generated by CountOrSell first-run wizard. Do not edit manually.
# To regenerate, run the wizard again.
version: '3.8'

services:
  app:
    image: ${REGISTRY}/countorsell:latest
    environment:
      - POSTGRES_CONNECTION=Host=postgres;Database=countorsell;Username=${DB_USER};Password=${DB_PASSWORD}
      - INSTANCE_NAME=${INSTANCE_NAME}
      - UPDATE_CHECK_TIME=${UPDATE_CHECK_TIME}
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE}
      - BACKUP_RETENTION=${BACKUP_RETENTION}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=countorsell
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - countorsell_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d countorsell"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  reverse-proxy:
    image: nginx:alpine
    ports:
      - "${PORT}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped

  backup:
    image: ${REGISTRY}/countorsell-backup:latest
    environment:
      - POSTGRES_CONNECTION=Host=postgres;Database=countorsell;Username=${DB_USER};Password=${DB_PASSWORD}
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE}
      - BACKUP_RETENTION=${BACKUP_RETENTION}
      - BLOB_BACKUP_CONNECTION=${BLOB_BACKUP_CONNECTION}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  countorsell_postgres_data:
    name: countorsell_postgres_data
