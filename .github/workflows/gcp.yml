name: GCP Terraform
on:
  push:
    branches: [main]
    paths: ['infrastructure/gcp/**']
  pull_request:
    branches: [main]
    paths: ['infrastructure/gcp/**']
env:
  TF_WORKING_DIR: infrastructure/gcp
jobs:
  check-credentials:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          SA_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        run: |
          if [[ -n "$SA_KEY" && -n "$STATE_BUCKET" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Required secrets not configured - skipping deployment."
            echo "See docs/deployment/credentials.md for setup instructions."
          fi
  terraform:
    needs: check-credentials
    if: needs.check-credentials.outputs.configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
        working-directory: ${{ env.TF_WORKING_DIR }}
      - name: Terraform Plan
        run: terraform plan -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}
