name: PR Build and Test
on:
  pull_request:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore src/CountOrSell.sln
      - name: Build
        run: dotnet build src/CountOrSell.sln --no-restore --configuration Release /warnaserror
      - name: Test
        run: dotnet test src/CountOrSell.sln --no-build --configuration Release --verbosity normal
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker build (linux/amd64, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
